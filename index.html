<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhash Pro Saver</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 500px; border-top: 8px solid #28a745; }
        h2 { color: #28a745; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; resize: none; box-sizing: border-box; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .btn-txt { background-color: #007bff; }
        .btn-doc { background-color: #2196F3; }
        .btn-html { background-color: #ff9800; }
        .btn-print { background-color: #dc3545; grid-column: span 2; font-size: 18px; margin-top: 5px; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Subhash Pro Saver</h2>
    <textarea id="userInput" placeholder="यहाँ हिंदी या अंग्रेजी में लिखें..."></textarea>
    
    <div class="button-grid">
        <button class="btn-txt" onclick="saveFile('txt')">Save as TEXT</button>
        <button class="btn-doc" onclick="saveFile('doc')">Save as WORD</button>
        <button class="btn-html" onclick="saveFile('html')">Save as HTML</button>
        <button class="btn-print" onclick="window.print()">PRINT / PDF बनाएँ</button>
    </div>
</div>

<script>
    function saveFile(type) {
        const text = document.getElementById('userInput').value;
        if (!text) { alert("कृपया कुछ लिखें!"); return; }

        let fileName = "Subhash_File." + type;
        let mimeType = "text/plain";
        let content = text;

        if (type === 'doc') {
            mimeType = "application/msword";
            content = "\ufeff" + text; 
        } else if (type === 'html') {
            mimeType = "text/html";
            content = `<html><head><meta charset="UTF-8"></head><body><p style="font-size:20px;">${text.replace(/\n/g, "<br>")}</p></body></html>`;
        }

        const blob = new Blob([content], { type: mimeType });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }
</script>

</body>
</html>
